apiVersion: v1
kind: ConfigMap
metadata:
  name: satellite-config
  namespace: satellite
data:
  APP_NAME: satellite-analysis-poc
  APP_VERSION: "0.1.0"
  ENVIRONMENT: kubernetes-local
  PROJECT_ROOT: /app
  BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
  DATABASE_URL: postgresql://satellite:satellite@postgres:5432/satellite
  REDIS_URL: redis://redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_SECURE: "false"
  MINIO_UPLOADS_BUCKET: satellite-uploads
  MINIO_RESULTS_BUCKET: satellite-results
  UPLOADS_DIR: uploads
  RESULTS_DIR: results
  OBJECT_CACHE_DIR: storage/cache
  MODEL_CACHE_DIR: models/cache
  MODEL_BACKEND: grounded_sam
  OLLAMA_BASE_URL: http://host.minikube.internal:11434
